<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farmer Profile | AgriInvest AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <header class="dash-topbar">
    <div class="onb-brand">Editorial Agritech</div>
    <nav>
      <a href="investor-dashboard.html">Investor</a>
      <a href="farmer-profile.html" class="active">Farmer Detail</a>
    </nav>
    <button id="logoutBtn" class="btn btn-ghost" type="button">Logout</button>
  </header>

  <main class="dash-main">
    <section class="dash-hero card">
      <div>
        <p class="tiny">Farmer Profile</p>
        <h1 id="farmerName">Loading...</h1>
        <p id="farmerSummary">Fetching detailed farmer information.</p>
      </div>
      <div class="dash-status" id="farmerStatus">Status: Pending</div>
    </section>

    <section class="dash-grid">
      <article class="card">
        <h3>Contact</h3>
        <dl id="detailContact"></dl>
      </article>
      <article class="card">
        <h3>Farm</h3>
        <dl id="detailFarm"></dl>
      </article>
      <article class="card">
        <h3>Documents</h3>
        <dl id="detailDocs"></dl>
      </article>
    </section>

    <section class="card" style="margin-top:20px;">
      <h3>Invest in This Farmer</h3>
      <p>Enter an amount and create an investment intent.</p>
      <div class="row gap-sm" style="margin-top:10px;">
        <input id="investAmount" type="number" min="1" step="1" placeholder="Amount in USD" />
        <button id="investBtn" class="btn btn-primary" type="button">Invest</button>
      </div>
      <p id="investInfo" class="subtitle" style="margin-top:8px;"></p>
    </section>
  </main>

  <script type="module" src="../js/farmer-profile.js"></script>
</body>
</html>
